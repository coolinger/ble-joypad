; PlatformIO Project Configuration File
;
; Docs: https://docs.platformio.org/page/projectconf.html

[env:default]
; pioarduino fork = der weitergefuehrte espressif32-Platform (offizieller ist eingefroren).
; 55.03.39 -> Arduino-Core 3.3.9 / ESP-IDF 5.5.4 (latest release as of 2026-07).
;   https://github.com/pioarduino/platform-espressif32/releases
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
; Guition JC4827W543: ESP32-S3-WROOM-1 N4R8 (4 MB QIO flash, 8 MB octal PSRAM)
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 4MB
; 3 MB app, no OTA slots. OTA needs a custom two-slot table later (firmware must
; stay under ~1.97 MB for that) - see CHANGELOG.
board_build.partitions = huge_app.csv

lib_deps =
  ; ESP32-BLE-Gamepad is vendored under lib/ (patched: BleNUS.h needs an explicit
  ; #include <Arduino.h> under NimBLE 2.x). NimBLE pinned to its 2.x major.
  h2zero/NimBLE-Arduino@^2.5
  robtillaart/PCF8575@^0.3
  bblanchon/ArduinoJson@^7.4
  gilmaimon/ArduinoWebsockets@^0.5.4
  lvgl/lvgl@^9.5
  moononournation/GFX Library for Arduino@^1.6.6
  bitbank2/bb_captouch@^1.3

build_flags =
  -DARDUINO_USB_MODE=1         ; 1 = CDC (native USB), 0 = UART
  -DARDUINO_USB_CDC_ON_BOOT=1  ; keep CDC up from reset
  ; LVGL 9 finds the repo-root lv_conf.h via the include path:
  -DLV_CONF_INCLUDE_SIMPLE
  -DLV_LVGL_H_INCLUDE_SIMPLE
  -I .

; INACTIVE until the flash gets a two-slot OTA partition table (huge_app.csv has
; no ota_0/ota_1, so espota upload cannot work). Kept for the later OTA phase.
[env:ota]
extends = env:default
upload_protocol = espota
upload_port = FighterController.fritz.box
