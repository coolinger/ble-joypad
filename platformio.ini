; PlatformIO Project Configuration File
;
; Docs: https://docs.platformio.org/page/projectconf.html

[env:default]
; pioarduino fork = der weitergefuehrte espressif32-Platform (offizieller ist eingefroren bei core 2.0.x).
; 55.03.39 -> Arduino-Core 3.3.9 / ESP-IDF 5.5.4. Neuere Releases siehe:
;   https://github.com/pioarduino/platform-espressif32/releases
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = freenove_esp32_s3_wroom
framework = arduino
monitor_speed = 115200

lib_deps =
  lemmingDev/ESP32-BLE-Gamepad
  robtillaart/PCF8575@^0.2.4
  bblanchon/ArduinoJson@^7.2.0
  gilmaimon/ArduinoWebsockets@^0.5.4
  earlephilhower/ESP8266Audio

build_flags =
  -DARDUINO_USB_MODE=1         ; 1 = CDC (native USB), 0 = UART
  -DARDUINO_USB_CDC_ON_BOOT=1  ; keep CDC up from reset

;extra_scripts = post:memory_usage.py
